site_name: Lumbergh Documentation
site_url: https://voglster.github.io/lumbergh/docs/
site_description: Documentation for Lumbergh — a self-hosted dashboard for supervising multiple Claude Code sessions
repo_url: https://github.com/voglster/lumbergh
repo_name: voglster/lumbergh

docs_dir: docs-src
site_dir: site

theme:
  name: material
  palette:
    - scheme: slate
      primary: custom
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/analytics.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/index.md
      - Prerequisites: getting-started/prerequisites.md
      - Development Setup: getting-started/development.md
  - Guides:
      - Dashboard: guides/dashboard.md
      - Sessions: guides/sessions.md
      - Terminal: guides/terminal.md
      - Git Operations: guides/git-operations.md
      - Todos & Notes: guides/todos-and-notes.md
      - Prompt Templates: guides/prompt-templates.md
      - File Browser: guides/file-browser.md
      - Shared Files: guides/shared-files.md
      - Mobile & PWA: guides/mobile.md
      - AI Providers: guides/ai-providers.md
  - Reference:
      - Configuration: reference/configuration.md
      - Data Storage: reference/data-storage.md
  - Architecture: architecture.md
  - Troubleshooting: troubleshooting.md
